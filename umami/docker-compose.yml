      - 'caddy_0.handle_path=/*'
      - caddy_0.header=-Server
      - 'caddy_0.try_files={path} /index.html /index.php'
      - 'caddy_0=http://umami-xogcsw40c0gg0o0s40oco08o.46.62.206.47.sslip.io'
