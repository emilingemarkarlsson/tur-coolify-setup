      - traefik.http.routers.http-0-xogcsw40c0gg0o0s40oco08o-umami.service=http-0-xogcsw40c0gg0o0s40oco08o-umami
      - traefik.http.routers.http-1-xogcsw40c0gg0o0s40oco08o-umami.entryPoints=http
      - traefik.http.routers.http-1-xogcsw40c0gg0o0s40oco08o-umami.middlewares=redirect-to-https
      - 'traefik.http.routers.http-1-xogcsw40c0gg0o0s40oco08o-umami.rule=Host(`umami.theunnamedroads.com`) && PathPrefix(`/`)'
      - traefik.http.routers.https-1-xogcsw40c0gg0o0s40oco08o-umami.entryPoints=https
      - traefik.http.routers.https-1-xogcsw40c0gg0o0s40oco08o-umami.middlewares=gzip
      - 'traefik.http.routers.https-1-xogcsw40c0gg0o0s40oco08o-umami.rule=Host(`umami.theunnamedroads.com`) && PathPrefix(`/`)'
      - traefik.http.routers.https-1-xogcsw40c0gg0o0s40oco08o-umami.tls.certresolver=letsencrypt
      - traefik.http.routers.https-1-xogcsw40c0gg0o0s40oco08o-umami.tls=true
      - traefik.http.services.http-0-xogcsw40c0gg0o0s40oco08o-umami.loadbalancer.server.port=3000
